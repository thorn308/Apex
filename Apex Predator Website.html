<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Apex Predator — Website Mocks</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Anton&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin:0; padding:0; background:#f0eee9; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; color:#1a1a1a; }
  .nb-card {
    padding: 22px 26px; background:#fef4a8; color:#5a4a2a;
    height:100%; box-sizing:border-box; overflow:auto;
    display:flex; flex-direction:column; gap:10px;
  }
  .nb-card h3 { font-family:'Oswald', sans-serif; margin:0; font-size:15px;
                letter-spacing:0.18em; text-transform:uppercase; font-weight:600; }
  .nb-card p  { margin:0; font-size:12.5px; line-height:1.5; }
  .nb-card ul { margin:0; padding-left:18px; font-size:12.5px; line-height:1.55; }
  .nb-card li + li { margin-top:4px; }

  /* swatch tokens card */
  .tokens { padding:24px; background:#fafaf7; height:100%; box-sizing:border-box;
            display:grid; grid-template-columns:repeat(4,1fr); gap:14px;
            font-family:-apple-system,sans-serif; }
  .tk { display:flex; flex-direction:column; gap:6px; }
  .tk .chip { aspect-ratio:1.2/1; border-radius:3px; border:1px solid rgba(0,0,0,0.06); }
  .tk .nm { font-family:'Oswald', sans-serif; font-size:11px;
            letter-spacing:0.16em; text-transform:uppercase; }
  .tk .hx { font-family:'JetBrains Mono', monospace; font-size:9px;
            letter-spacing:0.06em; opacity:0.5; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="brand.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>

<script type="text/babel">
const Brief = () => (
  <div className="nb-card">
    <h3>Brief</h3>
    <p><b>Apex Predator</b> · Washington-based maker of precision rifle components (Magazines, Bolt Block, Single Shot Sled, Accessories) — designed &amp; 3D-printed in-house.</p>
    <p><b>Tone:</b> Outdoor / hunting heritage — rugged, earthy, built-not-bought. No grunge textures; restraint &amp; precision do the heavy lifting.</p>
    <p><b>Pages mocked:</b> Home (A &amp; B hero), Shop, Our Story, Technology, Cart, Contact / Dealers — desktop + mobile each.</p>
    <p><b>Logo lockup:</b> Direction A — skull + APEX&nbsp;PREDATOR + descriptor.</p>
  </div>
);

const SystemNotes = () => (
  <div className="nb-card">
    <h3>Type system</h3>
    <ul>
      <li><b>Display</b> · Oswald 600/700 — buttons, headings, product names</li>
      <li><b>Editorial display</b> · Anton — only for hero "BE APEX"</li>
      <li><b>Body</b> · Source Sans 3</li>
      <li><b>Spec / serial</b> · JetBrains Mono — eyebrows, SKUs, metadata</li>
    </ul>
    <h3 style={{marginTop:6}}>Component rules</h3>
    <ul>
      <li>Eyebrow above every section H2 (mono caps).</li>
      <li>Product cards: media → name (Oswald) → SKU (mono) → price + add.</li>
      <li>Imagery uses striped placeholders + mono explainers until real photos.</li>
    </ul>
  </div>
);

const Palette = () => {
  const tokens = [
    ['Bone',     '#F4F1EA', 'primary light surface'],
    ['Linen',    '#ECE7DA', 'secondary surface'],
    ['Paper',    '#FFFFFF', 'card surface'],
    ['Ink',      '#0A0A0A', 'type on light'],
    ['Gunmetal', '#2B2F33', 'primary dark surface'],
    ['Steel',    '#3A3F44', 'dark elevation'],
    ['Brass',    '#B58C4A', 'primary accent'],
    ['Wheat',    '#D9C89E', 'imagery wash'],
  ];
  return (
    <div className="tokens">
      {tokens.map(([n, h, d]) => (
        <div className="tk" key={h}>
          <div className="chip" style={{ background:h,
               border: h === '#FFFFFF' || h === '#F4F1EA' ? '1px solid rgba(0,0,0,0.12)' : null }} />
          <div className="nm">{n}</div>
          <div className="hx">{h}</div>
          <div className="hx" style={{textTransform:'lowercase'}}>{d}</div>
        </div>
      ))}
    </div>
  );
};

const App = () => (
  <DesignCanvas>
    <DCSection id="overview" title="Overview" subtitle="Brand system + the pages we're mocking">
      <DCArtboard id="brief"  label="Brief"        width={360} height={360}><Brief/></DCArtboard>
      <DCArtboard id="type"   label="Type system"  width={360} height={360}><SystemNotes/></DCArtboard>
      <DCArtboard id="palette" label="Palette"     width={600} height={300}><Palette/></DCArtboard>
    </DCSection>

    <DCSection id="home" title="Home" subtitle="A — editorial heritage hero · B — split / catalog-first">
      <DCArtboard id="home-a-d" label="A · Desktop · Editorial hero" width={1280} height={3120}><HomeDesktopA/></DCArtboard>
      <DCArtboard id="home-a-m" label="A · Mobile"                   width={390}  height={2050}><HomeMobileA/></DCArtboard>
      <DCArtboard id="home-b-d" label="B · Desktop · Split / catalog-first" width={1280} height={2640}><HomeDesktopB/></DCArtboard>
      <DCArtboard id="home-b-m" label="B · Mobile"                   width={390}  height={2080}><HomeMobileB/></DCArtboard>
    </DCSection>

    <DCSection id="shop" title="Shop / catalog" subtitle="3-col grid · left rail of filters · pagination">
      <DCArtboard id="shop-d" label="Desktop" width={1280} height={2200}><ShopDesktop/></DCArtboard>
      <DCArtboard id="shop-m" label="Mobile"  width={390}  height={1880}><ShopMobile/></DCArtboard>
    </DCSection>

    <DCSection id="about" title="Our Story" subtitle="Editorial long-form with hero, prose, and values">
      <DCArtboard id="about-d" label="Desktop" width={1280} height={2240}><AboutDesktop/></DCArtboard>
      <DCArtboard id="about-m" label="Mobile"  width={390}  height={1840}><AboutMobile/></DCArtboard>
    </DCSection>

    <DCSection id="tech" title="Technology" subtitle="Process explainer + materials + comparison table">
      <DCArtboard id="tech-d" label="Desktop" width={1280} height={2400}><TechDesktop/></DCArtboard>
      <DCArtboard id="tech-m" label="Mobile"  width={390}  height={2080}><TechMobile/></DCArtboard>
    </DCSection>

    <DCSection id="cart" title="Cart" subtitle="Line items + sticky summary + upsell row">
      <DCArtboard id="cart-d" label="Desktop" width={1280} height={1700}><CartDesktop/></DCArtboard>
      <DCArtboard id="cart-m" label="Mobile"  width={390}  height={1340}><CartMobile/></DCArtboard>
    </DCSection>

    <DCSection id="contact" title="Contact / Dealers" subtitle="Contact form + shop info + dealer locator map">
      <DCArtboard id="contact-d" label="Desktop" width={1280} height={2000}><ContactDesktop/></DCArtboard>
      <DCArtboard id="contact-m" label="Mobile"  width={390}  height={2080}><ContactMobile/></DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
